stages:
  - deploy

# Deploy to production
deploy_production:
  stage: deploy
  image: alpine:latest
  
  before_script:
    # Install SSH client
    - apk add --no-cache openssh-client rsync git
    
    # Setup SSH
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp $WP_SSH_PRIVATE_KEY ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    
    # Add EC2 to known hosts (disable host key checking for simplicity)
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    
  script:
    # Deploy theme files to EC2
    - echo "Deploying $THEME_NAME to $WP_EC2_HOST..."

    # Detect changed files using Git diff
    - echo "Detecting changed files..."
    - git fetch --unshallow || true  # Ensure we have full git history
    - |
      # Get changed and added files (excluding deleted)
      git diff --name-only --diff-filter=AM HEAD~1 HEAD | \
        grep -v '^\.git/' | \
        grep -v '^node_modules/' | \
        grep -v '^\.gitlab-ci\.yml$' | \
        grep -v '^README\.md$' \
        > changed_files.txt || echo "No changed files to deploy"
      
      # Get deleted files
      git diff --name-only --diff-filter=D HEAD~1 HEAD | \
        grep -v '^\.git/' | \
        grep -v '^node_modules/' | \
        grep -v '^\.gitlab-ci\.yml$' | \
        grep -v '^README\.md$' \
        > deleted_files.txt || echo "No deleted files"
      
      echo "Changed/Added files:"
      cat changed_files.txt || echo "None"
      echo ""
      echo "Deleted files:"
      cat deleted_files.txt || echo "None"

    # Set permissions BEFORE rsync
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo chown -R deploy:apache /var/www/html/wordpress/wp-content/themes/${THEME_NAME}"
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo chmod -R 775 /var/www/html/wordpress/wp-content/themes/${THEME_NAME}"
    
    # Deploy only changed files using rsync
    - |
      if [ -s changed_files.txt ]; then
        echo "Deploying changed files..."
        rsync -avz --files-from=changed_files.txt ./ ${WP_EC2_USER}@${WP_EC2_HOST}:/var/www/html/wordpress/wp-content/themes/${THEME_NAME}/
      else
        echo "No changed files to deploy"
      fi
    
    # Handle deleted files
    - |
      if [ -s deleted_files.txt ]; then
        echo "Removing deleted files from server..."
        while IFS= read -r file; do
          ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo rm -f /var/www/html/wordpress/wp-content/themes/${THEME_NAME}/$file" || true
        done < deleted_files.txt
      else
        echo "No files to delete"
      fi
    
    # Set correct permissions on EC2
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo chown -R apache:apache /var/www/html/wordpress/wp-content/themes/${THEME_NAME}/"
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo chmod -R 755 /var/www/html/wordpress/wp-content/themes/${THEME_NAME}/"

    # Fix SELinux context
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo chcon -R -t httpd_sys_rw_content_t /var/www/html/wordpress/wp-content/themes/${THEME_NAME}" || true
    
    # Optional: Clear WordPress cache
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "cd /var/www/html/wordpress && wp cache flush --allow-root" || true
    
    # Optional: Restart Apache
    - ssh ${WP_EC2_USER}@${WP_EC2_HOST} "sudo systemctl restart httpd"
    
    - echo "Deployment completed successfully!"
  
  only:
    - main  # Only deploy when pushing to main branch
  
  environment:
    name: production
    url: https://www3.assetwise.dev

